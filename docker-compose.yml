services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./data-processing/mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  influxdb:
    image: influxdb:2
    container_name: iot-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped

  node-red:
    build: ./data-processing/node-red
    container_name: iot-node-red
    ports:
      - "1880:1880"
    environment:
      MQTT_BROKER: mqtt://mosquitto:1883
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    volumes:
      - ./data-processing/node-red/data:/data
      - ./shared:/shared:ro
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: visualization/Dockerfile
    container_name: iot-frontend
    ports:
      - "80:80"
    depends_on:
      - influxdb
    restart: unless-stopped

  bike-simulator:
    build:
      context: simulation
      dockerfile: Dockerfile
    container_name: iot-simulator
    environment:
      BROKER_URL: mqtt://mosquitto:1883
      TICK_MS: ${TICK_MS:-2000}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
